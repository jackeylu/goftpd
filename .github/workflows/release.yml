name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache: true

    - name: Build
      env:
        CGO_ENABLED: 0
      run: |
        VERSION=${GITHUB_REF_NAME}
        COMMIT=$(git rev-parse --short HEAD)
        DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        LDFLAGS="-X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}"

        # Windows
        GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o goftpd-${VERSION}-windows-amd64.exe .
        # macOS
        GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o goftpd-${VERSION}-darwin-amd64 .
        GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o goftpd-${VERSION}-darwin-arm64 .
        # Linux
        GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o goftpd-${VERSION}-linux-amd64 .

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          goftpd-*
